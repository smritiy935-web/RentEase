<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RentEase</title>
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar for Desktop -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-logo">
                    <div class="logo-icon">R</div>
                    <span>RentEase</span>
                </a>
                <p class="sidebar-subtitle">Admin Panel</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="admin.html" class="nav-item active">
                    <ion-icon name="grid-outline"></ion-icon>
                    Dashboard
                    <ion-icon name="chevron-forward-outline" class="ml-auto"></ion-icon>
                </a>
                <a href="admin-products.html" class="nav-item">
                    <ion-icon name="cube-outline"></ion-icon>
                    Products
                </a>
                <a href="admin-orders.html" class="nav-item">
                    <ion-icon name="clipboard-outline"></ion-icon>
                    Orders
                </a>
                <a href="admin-rentals.html" class="nav-item">
                    <ion-icon name="home-outline"></ion-icon>
                    Rentals
                </a>
                <a href="#" class="nav-item">
                    <ion-icon name="construct-outline"></ion-icon>
                    Maintenance
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="index.html" class="back-link">
                    <ion-icon name="arrow-back-outline"></ion-icon>
                    Back to Store
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="admin-main">
            <!-- Mobile admin bar -->
            <div class="mobile-admin-bar">
                <div class="mobile-nav">
                    <a href="admin.html" class="mobile-nav-item active">
                        <ion-icon name="grid-outline"></ion-icon>
                        <span>Dashboard</span>
                    </a>
                    <a href="admin-products.html" class="mobile-nav-item">
                        <ion-icon name="cube-outline"></ion-icon>
                        <span>Products</span>
                    </a>
                    <a href="admin-orders.html" class="mobile-nav-item">
                        <ion-icon name="clipboard-outline"></ion-icon>
                        <span>Orders</span>
                    </a>
                    <a href="admin-rentals.html" class="mobile-nav-item">
                        <ion-icon name="home-outline"></ion-icon>
                        <span>Rentals</span>
                    </a>
                    <a href="#" class="mobile-nav-item">
                        <ion-icon name="construct-outline"></ion-icon>
                        <span>Maintenance</span>
                    </a>
                </div>
            </div>

            <!-- Dashboard Content -->
            <main class="admin-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div>
                        <h1 style="margin-bottom: 4px;">Analytics Overview</h1>
                        <p style="color: var(--text-muted); font-size: 14px;">Overview of your rental business</p>
                    </div>
                </div>
                
                <!-- KPI Cards Section -->
                <div class="kpi-grid mb-8" id="kpiContainer">
                    <!-- Skeletons / Cards dynamically injected -->
                </div>

                <!-- Charts Section -->
                <div class="chart-grid">
                    <!-- Revenue Area Chart Card -->
                    <div class="admin-panel glass">
                        <h2 style="margin-bottom: 16px; font-size: 18px;">Monthly Revenue</h2>
                        <div id="revenueChartContainer" class="chart-container">
                            <canvas id="revenueCanvas"></canvas>
                        </div>
                        <div id="revenueLoader" class="skeleton" style="height: 240px; width: 100%; display: none;"></div>
                    </div>

                    <!-- Category Breakdown Pie Chart -->
                    <div class="admin-panel glass">
                        <h2 style="margin-bottom: 16px; font-size: 18px;">By Category</h2>
                        <div id="pieChartContainer" class="pie-wrapper">
                            <canvas id="categoryPieCanvas"></canvas>
                        </div>
                        <div id="pieLoader" class="skeleton" style="height: 240px; width: 100%; display: none;"></div>
                        <div id="pieEmptyMsg" style="display: none; text-align: center; color: var(--text-muted); padding: 32px 0;">No data available</div>
                    </div>
                </div>

                <div class="admin-sections" style="margin-top: 32px;">
                    <!-- Active Rentals List -->
                    <div class="admin-panel glass">
                        <h3 class="panel-title">Recent Rentals</h3>
                        <div id="admin-rentals-list">
                            <!-- Rentals rendered here -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
