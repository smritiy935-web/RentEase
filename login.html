<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RentEase</title>
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; }
        .form-control { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none; }
        .form-control:focus { border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="login-card glass">
            <div class="logo" style="justify-content: center; margin-bottom: 32px;">
                <ion-icon name="home"></ion-icon>
                <span>RentEase</span>
            </div>
            <h2 style="margin-bottom: 24px;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" value="user@rentease.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" value="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Sign In</button>
            </form>
            <p style="margin-top: 24px; color: var(--text-muted); font-size: 14px;">
                Just click Sign In to test the flow.
            </p>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('user', JSON.stringify({ isLoggedIn: true, name: "Test User", role: "user" }));
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
