<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products - RentEase</title>
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .filter-active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .filter-inactive {
            background-color: white;
            color: var(--text-main);
            border-color: var(--border-light);
        }
        .filter-inactive:hover {
            background-color: rgba(249, 115, 22, 0.05);
            border-color: var(--primary);
        }
        .search-container {
            position: relative;
            flex: 1;
        }
        .search-container ion-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }
        .search-input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <header class="main-header glass">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">R</div>
                <span>RentEase</span>
            </a>
            
            <nav class="nav-links">
                <a href="products.html" class="active">Browse</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="support.html">Support</a>
            </nav>
            
            <div class="nav-actions">
                <button class="hamburger-main" onclick="document.querySelector('.nav-links').classList.toggle('show')">
                    <ion-icon name="menu-outline"></ion-icon>
                </button>
                <a href="cart.html" class="icon-btn">
                    <ion-icon name="cart-outline"></ion-icon>
                    <span class="badge" id="cartBadge" style="display:none;">0</span>
                </a>
                <a href="admin.html" class="icon-btn">
                    <ion-icon name="person-outline"></ion-icon>
                </a>
            </div>
        </div>
    </header>

    <main class="page-container" style="max-width: 1200px; margin: 40px auto; padding: 0 24px;">
        <div style="margin-bottom: 32px;">
            <h1 style="font-size: 28px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">Browse Products</h1>
            <p id="productCountText" style="color: var(--text-muted); font-size: 14px;">Loading products...</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px;">
            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                <div class="search-container" style="min-width: 250px;">
                    <ion-icon name="search-outline"></ion-icon>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
                </div>
                
                <div id="categoryFilters" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;">
                    <button id="filterAll" data-category="all" class="filter-active" style="padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid; display: flex; align-items: center; gap: 6px; white-space: nowrap;">
                        <ion-icon name="filter-outline"></ion-icon> All
                    </button>
                    <!-- Other filters injected -->
                </div>
            </div>
        </div>

        <div id="productsContainer">
            <div id="skeletonLoader" class="products-grid">
                <!-- Skeletons -->
                <div class="skeleton" style="aspect-ratio: 4/3; border-radius: 12px; margin-bottom: 12px;"></div>
                <div class="skeleton" style="aspect-ratio: 4/3; border-radius: 12px; margin-bottom: 12px;"></div>
                <div class="skeleton" style="aspect-ratio: 4/3; border-radius: 12px; margin-bottom: 12px;"></div>
                <div class="skeleton" style="aspect-ratio: 4/3; border-radius: 12px; margin-bottom: 12px;"></div>
            </div>

            <div id="emptyState" style="text-align: center; padding: 64px 0; display: none;">
                <div style="width: 64px; height: 64px; background: var(--bg-card); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <ion-icon name="cube-outline" style="font-size: 32px; color: var(--border-light);"></ion-icon>
                </div>
                <p style="font-size: 18px; font-weight: 500; margin-bottom: 8px;">No products found</p>
                <p style="color: var(--text-muted); font-size: 14px;">Try adjusting your search or filters.</p>
            </div>

            <div id="productsGrid" class="products-grid" style="display: none;">
                <!-- Cards injected here -->
            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
